# RotaOptimaldsPy alternative obstacle-avoidance scenario
# waypoint format:
# waypoint = X,Y,psig,Kf,tol,use_Kf,w_wp,hit_scale
# obstacle format:
# obstacle = cx,cy,radius[,enabled]

N_MPC = 30

ds_min = 0.05
ds_max = 3.5
K_max = 0.3
S_max = 18
nseg = 2
w_pos = 60.0
w_psi = 20.0
w_K = 0.5
w_Kcmd = 0.25
w_dKcmd = 60.0
w_ds_smooth = 0.2
ds_jump_max = 0.5
w_Kf = 120.0

w_prog = 0.0
alpha_prog = 0.0
hit_ratio = 0.7

block_lengths_Kcmd = 1,1,2,2,2,2,2,2,2,2,2,2,2,2,2,1,1
block_lengths_ds   = 1,1,2,2,2,2,2,2,2,2,2,2,2,2,2,1,1

x0 = 0.0
y0 = 0.0
psi0 = 0.0
K0 = 0.0

tol_default = 1.5
max_iters = 320
use_heading_gate = false
tol_psi_deg = 15.0
w_wp_intermediate = 5.0
term_scale_intermediate = 0.3
term_scale_final = 0.3
hit_scale_intermediate = 0.7
w_wp_final = 1.0
use_wp_kf = true
kf_fallback = 0.0

enable_obstacle_avoidance = true
obstacle_clearance = 2.0
obstacle_trigger_margin = 1.5
obstacle_waypoint_tol = 1.5

# Single target with eight obstacles on and near the direct path
waypoint = 120.0, 60.0, 0.6, 0.0, 1.5, false,,

obstacle = 35.0, 18.0, 10
